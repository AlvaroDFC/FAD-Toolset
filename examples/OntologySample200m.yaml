type: draft/example of floating array ontology under construction
name: 
comments: 
# Site condition information
site:
    general:
        water_depth : 200        # [m]      uniform water depth
        rho_water   : 1025.0     # [kg/m^3] water density
        rho_air     : 1.225      # [kg/m^3] air density
        mu_air      : 1.81e-05   #          air dynamic viscosity
        #...
        
    boundaries:  # project or lease area boundary, via file or vertex list
        file:   # filename of x-y vertex coordinates [m]
        x_y:    # list of polygon vertices in order [m]
          - [-2500, -2500]
          - [-2500, -800] 
          - [2500, -800]
          - [2500, -2500]
          - [-2500, -2500]
    
    exclusions:
      - name: round example
        x_y_r:
          - [x1, y1, r1] 
      
      - name: polygon example with sharp corners (radius ommitted)
        x_y_r:
            -[x1, y1]
            -[x2, y2]
    
    bathymetry:
        file:   './Common_Inputs/bathymetry200m_sample.txt'
    
    seabed:
      x : [-2500,    0,  2500]
      y : [-2500,    -1650,  -800]
    
      type_array:
        - [mud_hard ,  mud_firm ,   mud_hard]  
        - [mud_firm ,  mud_soft ,   mud_firm]  
        - [mud_soft ,  mud_firm ,   mud_soft]
      
      soil_types:  
        mud_soft:
            layers: 
            - soil_type: clay
              top: 0
              bottom: 50
              gamma_top: 10.0
              gamma_bot: 10.0
              Su_top: 2.39
              Su_bot: 59.39
        mud_firm:
            layers:
            - soil_type: clay            
              top: 0
              bottom: 50
              gamma_top: 10.0
              gamma_bot: 50.0
              Su_top: 23.4
              Su_bot: 157.44
        mud_hard: 
            layers:
            - soil_type: clay            
              top: 0
              bottom: 50
              gamma_top: 8.5
              gamma_bot: 8.5
              Su_top: 50.0
              Su_bot: 100.00  
        rock:
            layers:
            - soil_type: rock
              top: 0
              bottom: 50
              UCS_top: 5.0
              UCS_bot: 5.0
              Em_top: 7.0
              Em_bot: 7.0
        
    RAFT_cases:
        keys : [wind_speed, wind_heading, turbulence, turbine_status, yaw_misalign, wave_spectrum, wave_period, wave_height, wave_heading  ]
        data :  #   m/s        deg    % or e.g. IIB_NTM    string            deg         string          (s)         (m)         (deg)
            -  [     0,         0,            0,          operating,          0,        JONSWAP,         12,         6,           0        ]
            # -  [    16,         0,            IIB_NTM,    operating,          0,        JONSWAP,         12,         6,           30       ]
            # -  [    10.59,         0,            0.05,    operating,          0,        JONSWAP,         15.75,         11.86,         0       ]

    RAFT_settings:   
        min_freq     :  0.001    #  [Hz]       lowest frequency to consider, also the frequency bin width     
        max_freq     :  0.20    #  [Hz]       highest frequency to consider
        XiStart      :   0      # sets initial amplitude of each DOF for all frequencies
        nIter        :   4      # sets how many iterations to perform in Model.solveDynamics()
        
    marine_growth:
        keys: [thickness, lowerRange, upperRange, density]
        data:   #  (m)       (m)          (m)     (kg/m^3)
        - [0.00,-200,-170, 1325]
        - [0.01,-170,-40, 1325]
        - [0.05,-40,0, 1325]
        buoys: [0.01,0.01]
# ----- Array-level inputs -----

# Wind turbine array layout
array:
    keys : [ID, topsideID, platformID, mooringID,   x_location,     y_location,  z_location, heading_adjust]
    data : #    ID#        ID#        ID#          [m]             [m]           [m]          [deg]
        -  [FOWT1,     1,         1,         ms3,          -1600,         -1600,     0,       180 ]    # 2 turbine array
        -  [FOWT2,     1,         1,         ms3,          0,           -1600,       0,       0   ] 
        -  [OSS1,      2,         2,         ms3,          1600,           -1600,    0,       180   ] # substation


# Array-level mooring system (in addition to any per-turbine entries later)
array_mooring:
    anchor_keys :
          [ID, type,  x,  y,  embedment ]
    anchor_data :
          
    line_keys : 
          [MooringConfigID  ,  endA,   endB,  fairleadA, fairleadB]
    line_data :
        # - [ rope_shared       ,  FOWT1,  FOWT2, 0,  0,  None] # shared mooring doesn't need a heading specification
        # - [ semitaut-poly_1,  FOWT1,  Anchor1, None,  0,  30] # shared anchor doesn't need a fairleadA specification


# Array cables 
array_cables:   
    keys:  [ AttachA,  AttachB,  DynCableA, DynCableB, JTubeA, JTubeB, headingA, headingB, cableType]
    data:
      - [ FOWT2, OSS1, suspended_1, None, 2, 2, 90, 90, None] # suspended cable, so only one dynamic cable configuration, no static cable


# ----- Mooring system -----

# Mooring system descriptions (each for an individual FOWT with no sharing)
mooring_systems:

    ms3:
        name: 3-line semi-taut polyester mooring system
        
        keys: [MooringConfigID,  heading, anchorType, fairlead, lug] # fairlead and lug listings are optional; if not specified, fairlead list follows order of fairleads in the platform definition
        data:
          - [  semitaut-poly_1,  30 ,    drag-embedment1,   1, 1 ]
          - [  semitaut-poly_1,  150 ,     drag-embedment1,   2,   1 ]
          - [  semitaut-poly_1,  270,     drag-embedment1,   3,    1 ]


# Mooring line configurations
mooring_line_configs:
            
    rope_shared:
        name: shared rope 
        
        span: 1484

        
        sections:
          - subsections: # subsections are used to define segments of mooring that run in parallel, such as a bridle
              - - connectorType: h_link # end A connector to the fairlead A0
                - type: chain_185 # each outer list is a separate subsection, each inner list is the segments of the subsection that are connected in series
                  length: 40 
              - - connectorType: h_link # end A connector to the fairlead A1
                - type: chain_185
                  length: 40  
          - connectorType: h_link
          - type: rope
            length: 110
          - connectorType: clump_weight_80
          - type: rope
            length: 500
          - connectorType: triplate
          - subsections: # a subsection that is not on the end of a mooring connects back to the connector on either side
              - - type: chain_185
                  length: 180
              - - type: chain_185
                  length: 180 
          - connectorType: triplate
          - type: rope
            length: 500
          - connectorType: clump_weight_80
          - type: rope
            length: 110
          - connectorType: h_link
          - subsections:
              - - type: chain_185
                  length: 40 
                - connectorType: h_link # end B connector to the fairlead B0
              - - type: chain_185
                  length: 40  
                - connectorType: h_link # end B connector to the fairlead B1

    
    semitaut-poly_1:  # mooring line configuration identifier
    
        name: Semitaut polyester configuration 1  # descriptive name
        
        span: 642
        
        sections:                 #in order from anchor to fairlead
          - mooringFamily: chain      # ID of a mooring line section type
            d_nom: .1549
            length: 497.7            # [m] usntretched length of line section
            adjustable: True      # flags that this section could be adjusted to accommodate different spacings...
          - connectorType: h_link   
          - mooringFamily: polyester        # ID of a mooring line section type
            d_nom: .182
            length: 199.8           # [m] length (unstretched)

    semitaut-poly_1_bridle:  # mooring line configuration identifier
    
        name: Semitaut polyester configuration 1  # descriptive name
        
        span: 642
        
        sections:                 #in order from anchor to fairlead
          - mooringFamily: chain      # ID of a mooring line section type
            d_nom: .1549
            length: 497.7            # [m] usntretched length of line section
            adjustable: True      # flags that this section could be adjusted to accommodate different spacings...
          - connectorType: h_link   
          - mooringFamily: polyester        # ID of a mooring line section type
            d_nom: .182
            length: 119.8           # [m] length (unstretched)
          - subsections:
            - - mooringFamily: polyester        # ID of a mooring line section type
                d_nom: .182
                length: 80           # [m] length (unstretched)
            - - mooringFamily: polyester        # ID of a mooring line section type
                d_nom: .182
                length: 80           # [m] length (unstretched)

   
    
# Mooring line cross-sectional properties
mooring_line_types:

    chain_185:
        d_nom:    0.185 
        d_vol:    0.333
        m:        685 
        EA:       3270000000
        MBL:      22286000
        material: chain
    
    rope:
        d_nom:    0.2246
        d_vol:    0.1797
        m:        34.85
        EA:       4.761e7
        MBL:    11.75e6      # [N] minimum breaking load ### JUST COPIED FROM POLYESTER, NOT REPRESENTATIVE OF A REAL VALUE NECESSARILY#########
        material: rope 


# Mooring connector properties
mooring_connector_types:
    
    h_link:
        m  : 140    # [kg]  component mass
        v : 0.13   # [m^3] component volumetric displacement
        
    clump_weight_20:
        m   : 20000  # [kg]
        v :  0.8   # [m^3]
        
    clump_weight_80:
        m   : 80000  # [kg]
        v :  0.0   # [m^3]
        
    buoy_10:
        m   :  560   # [kg]  component mass
        v  : 10.2   # [m^3] component volumetric displacement
        CdA    :  3.5   # [m^2] produce of cross sectional area and drag coefficient
    
    shackle:
        m   : 200
        v : .2

# Anchor type properties
anchor_types:

    drag-embedment1:
        type   :  DEA  # type of anchor
        B      :     5 # net area of anchor's fluke [m^2]
        L      :     2
        zlug   :    10 # embedded depth of padeye [m]
        mass   : 9000 # [kg] mass of anchor

          
# Dynamic and static cable configurations
dynamic_cable_configs:
# contains the subsections that make up each section of the subsea cable (i.e., what sections make up the lazywave cable in array_cable_1)              
    lazy_wave1:
        name: Lazy wave configuration 1 (simpler approach)
        voltage: 66 # [kV]
        span : 195    # [m] horizontal distance to end of dynamic cable from attachment point
        A: 300
        cable_type: dynamic_cable_66_1        # ID of a cable section type1
        length: 353.505                   # [m] length (unstretched) 
       
        sections: 
          - type: bend_stiffener_1
            L_mid: 3 # [m] from platform connection
          - type: buoyancy_module_1 #_w_buoy # (section properties including averaged effect of buoyancy modules)
            L_mid: 200 # [m] from platform connection
            N_modules: 6
            spacing: 11.23 # [m]
          - type: joint_1

        
    suspended_1:
        name: Dynamic suspended cable configuration 1 
        voltage: 33 
        span: 1590    
        cable_type: dynamic_cable_66        # ID of a cable section type1
        A: 300
        length: 1660                   # [m] length (unstretched)
            
        sections:            
          - type: Buoyancy_750m #_w_buoy # (section properties including averaged effect of buoyancy modules)
            L_mid: 510 # [m] from end A
            N_modules: 6.5
            spacing: 18 # [m]
            V: 2
            
          - type: Buoyancy_750m #_w_buoy # (section properties including averaged effect of buoyancy modules)
            L_mid: 1040 # [m] from end A
            N_modules: 6.5
            spacing: 18 # [m]
            V: 2
        
cables:
  - name : array_cable1      # descriptive cable name
    type : static_cable_66   # cable section type ID
  
    endA: 
        attachID: FOWT1            # FOWT/substation/junction ID
        heading:  260                  # [deg] heading of attachment at end A
        dynamicID: lazy_wave1  # ID of dynamic cable configuration at this end
        JTube: 1 # index of Jtube list in platform definition
    
    endB:
        attachID: FOWT2            # FOWT/substation/junction ID
        heading:  280                   # [deg] heading of attachment at end B
        dynamicID: lazy_wave1  # ID of dynamic cable configuration at this end
        JTube: 1 # index of Jtube list in platform definition
    
    routing_x_y_r:  # optional vertex points along the cable route. Nonzero radius wraps around a point at that radius.
      - [-900, -1450, 20] 
      - [-700, -1450, 20] 
    
    burial:  # optional definition of cable burial depth over its length
        station: [0, 1]                # length along cable, normalized by first and last value
        depth  : [0.1, 0.2]            # [m] burial depth
        
# Cable cross-sectional properties
cable_types:

    cable1: # random values of basic properties (these will be overwritten by cable layout optimization)
        # kV   :        66   # [kV] voltage rating
        # A    :       300   # [mm^2] cross-sectional area of each conductor (3 conductors)
        d    :      0.20   # [m] outer diameter
        m    :     30.59   # [kg/m] mass per unit length
        EA   :    700000   # [kN] axial stiffness 
        EI   :      10.0   # [kN.m^2] bending stiffness
        MBL  :       100   # [kN] minimum breaking load
        MBR  :       2.0   # [m] minimum bending radius
    
    dynamic_cable_66_1 :     # cable type identifier
        # kV   :        66   # [kV] voltage rating
        # A    :       300   # [mm^2] cross-sectional area of each conductor (3 conductors)
        d    :      0.16   # [m] outer diameter
        m    :     36.66   # [kg/m] mass per unit length
        EA   :    700000   # [kN] axial stiffness 
        EI   :      10.0   # [kN.m^2] bending stiffness
        MBL  :    383238  # [kN] minimum breaking load
        MBR  :       2.41   # [m] minimum bending radius
        voltage :    66
        w     :      155.828
        cost  : 1000 # example cost/m, not based on actual data

    static_cable_36:
        DC   :     False   # Flag for DC (default AC)
        # kV   :        36   # [kV] voltage rating
        # A    :       300   # [mm^2] cross-sectional area of each conductor (3 conductors)
        d    :    0.1248   # [m] outer diameter
        m    :     12.90   # [kg/m] mass per unit length
        EA   :    245000   # [kN] axial stiffness 
        EI   :      5.10   # [kN.m^2] bending stiffness
        MBL  :      54.0   # [kN] minimum breaking load
        MBR  :     1.875   # [m] minimum bending radius
        voltage :  36

# Cable appendages
cable_appendages:

    buoyancy_module_1:
        type: buoy
        m :    270.68   # [kg]  mass
        volume : 0.566   # [m^3] volumetric displacement 
        CdA:     3.8    # [m^2] product of cross-sectional area and drag coefficient
        l :  0.9    # [m]   length along cable
        density: 500
        w : -2915.0415
        d : 0.895
        cost: 3000 # example cost, not based on actual data
    joint_1 :
        type : joint
        m : 100000
        cost: 50000 # example cost, not based on actual data
    bend_stiffener_1 :
        type : bend_stiffener
        cost: 25000 # example cost, not based on actual data

# ----- topsides and platforms -----

topsides:
        
  - !include './Common_Inputs/IEA-15-240-RWT.yaml' # includes the turbine properties from a separate file for FOWTs
  - type: Substation # substation topside is empty for now. 
    

platforms:

  - potModMaster :   1      # [int] master switch for potMod variables; 0=keeps all member potMod vars the same, 1=turns all potMod vars to False (no HAMS), 2=turns all potMod vars to True (no strip)
    dlsMax       :  5.0     # maximum node splitting section amount for platform members; can't be 0
    qtfPath      :  'IEA-15-240-RWT-UMaineSemi.12d'      # path to the qtf file for the platform
    fairleads    :  # list of fairlead coordinates for the platform relative to platform coordinate and 0-degree heading
                   - name: fairlead1
                     r_rel: [58, 0, -14]
                     headings: [30, 150, 270, 35] # headings in degrees for the fairlead (if multiple headings, the fairlead will be repeated for each heading)
    JTubes       :  # list of Jtube coordinates for the platform relative to platform coordinate and 0-degree heading
                   - name: Jtube1
                     r_rel: [5, 0, -20]
                     headings: [90, 210, 330] # headings in degrees for the Jtube (if multiple headings, the Jtube will be repeated for each heading)
    type         :  FOWT
    z_location   :  0 # optional to put the depth of this platform type

    members:   # list all members here
        
      - name      :  center_column             # [-]    an identifier (no longer has to be number)       
        type      :  rigid                         # [-]    
        rA        :  [ 0, 0, -20]              # [m]    end A coordinates
        rB        :  [ 0, 0,  15]              # [m]    and B coordinates
        shape     :  circ                      # [-]    circular or rectangular
        gamma     :  0.0                       # [deg]  twist angle about the member's z-axis
        potMod    :  True                      # [bool] Whether to model the member with potential flow (BEM model) plus viscous drag or purely strip theory
        # --- outer shell including hydro---
        stations  :  [0, 1]                    # [-]    location of stations along axis. Will be normalized such that start value maps to rA and end value to rB
        d         :  10.0                      # [m]    diameters if circular or side lengths if rectangular (can be pairs)
        t         :  0.05                      # [m]    wall thicknesses (scalar or list of same length as stations)
        Cd        :  0.6                       # [-]    transverse drag coefficient       (optional, scalar or list of same length as stations)
        Ca        :  0.93                      # [-]    transverse added mass coefficient (optional, scalar or list of same length as stations)
        CdEnd     :  0.6                       # [-]    end axial drag coefficient        (optional, scalar or list of same length as stations)
        CaEnd     :  1.0                       # [-]    end axial added mass coefficient  (optional, scalar or list of same length as stations)
        rho_shell :  7850                      # [kg/m3] 
        # --- handling of end caps or any internal structures if we need them ---
        cap_stations :  [ 0    ]               # [m]  location along member of any inner structures (in same scaling as set by 'stations')
        cap_t        :  [ 0.001  ]             # [m]  thickness of any internal structures
        cap_d_in     :  [ 0    ]               # [m]  inner diameter of internal structures (0 for full cap/bulkhead, >0 for a ring shape)

        
      - name      :  outer_column              # [-]    an identifier (no longer has to be number)       
        type      :  rigid                         # [-]    
        rA        :  [51.75, 0, -20]           # [m]    end A coordinates
        rB        :  [51.75, 0,  15]           # [m]    and B coordinates
        heading   :  [ 60, 180, 300]           # [deg]  heading rotation of column about z axis (for repeated members)
        shape     :  circ                      # [-]    circular or rectangular
        gamma     :  0.0                       # [deg]  twist angle about the member's z-axis
        potMod    :  True                      # [bool] Whether to model the member with potential flow (BEM model) plus viscous drag or purely strip theory
        # --- outer shell including hydro---
        stations  :  [0, 35]                    # [-]    location of stations along axis. Will be normalized such that start value maps to rA and end value to rB
        d         :  12.5                      # [m]    diameters if circular or side lengths if rectangular (can be pairs)
        t         :  0.05                      # [m]    wall thicknesses (scalar or list of same length as stations)
        Cd        :  0.6                       # [-]    transverse drag coefficient       (optional, scalar or list of same length as stations)
        Ca        :  0.93                      # [-]    transverse added mass coefficient (optional, scalar or list of same length as stations)
        CdEnd     :  1.0                       # [-]    end axial drag coefficient        (optional, scalar or list of same length as stations)
        CaEnd     :  0.7 # value of 3.0 gives more heave response        # [-]    end axial added mass coefficient  (optional, scalar or list of same length as stations)
        rho_shell :  7850                      # [kg/m3] 
        # --- ballast ---
        l_fill    :  1.4                       # [m]
        rho_fill  :  5000                      # [kg/m3]
        # --- handling of end caps or any internal structures if we need them ---
        cap_stations :  [ 0    ]               # [m]  location along member of any inner structures (in same scaling as set by 'stations')
        cap_t        :  [ 0.001  ]             # [m]  thickness of any internal structures
        cap_d_in     :  [ 0    ]               # [m]  inner diameter of internal structures (0 for full cap/bulkhead, >0 for a ring shape)

        
      - name      :  pontoon                   # [-]    an identifier (no longer has to be number)       
        type      :  rigid                         # [-]    
        rA        :  [  5  , 0, -16.5]         # [m]    end A coordinates
        rB        :  [ 45.5, 0, -16.5]         # [m]    and B coordinates
        heading   :  [ 60, 180, 300]           # [deg]  heading rotation of column about z axis (for repeated members)
        shape     :  rect                      # [-]    circular or rectangular
        gamma     :  0.0                       # [deg]  twist angle about the member's z-axis
        potMod    :  False                     # [bool] Whether to model the member with potential flow (BEM model) plus viscous drag or purely strip theory
        # --- outer shell including hydro---
        stations  :  [0, 40.5]                    # [-]    location of stations along axis. Will be normalized such that start value maps to rA and end value to rB
        d         :  [12.4, 7.0]               # [m]    diameters if circular or side lengths if rectangular (can be pairs)
        t         :  0.05                      # [m]    wall thicknesses (scalar or list of same length as stations)
        Cd        :  [1.5, 2.2 ]               # [-]    transverse drag coefficient       (optional, scalar or list of same length as stations)
        Ca        :  [2.2, 0.2 ]               # [-]    transverse added mass coefficient (optional, scalar or list of same length as stations)
        CdEnd     :  0.0                       # [-]    end axial drag coefficient        (optional, scalar or list of same length as stations)
        CaEnd     :  0.0                       # [-]    end axial added mass coefficient  (optional, scalar or list of same length as stations)
        rho_shell :  7850                      # [kg/m3]
        l_fill    :  40.5                      # [m]
        rho_fill  :  1025.0                    # [kg/m3]
        
        
      - name      :  upper_support             # [-]    an identifier (no longer has to be number)       
        type      :  rigid                         # [-]    
        rA        :  [  5  , 0, 14.545]        # [m]    end A coordinates
        rB        :  [ 45.5, 0, 14.545]        # [m]    and B coordinates
        heading   :  [ 60, 180, 300]           # [deg]  heading rotation of column about z axis (for repeated members)
        shape     :  circ                      # [-]    circular or rectangular
        gamma     :  0.0                       # [deg]  twist angle about the member's z-axis
        potMod    :  False                     # [bool] Whether to model the member with potential flow (BEM model) plus viscous drag or purely strip theory
        # --- outer shell including hydro---
        stations  :  [0, 1]                    # [-]    location of stations along axis. Will be normalized such that start value maps to rA and end value to rB
        d         :  0.91                      # [m]    diameters if circular or side lengths if rectangular (can be pairs)
        t         :  0.01                      # [m]    wall thicknesses (scalar or list of same length as stations)
        Cd        :  0.0                       # [-]    transverse drag coefficient       (optional, scalar or list of same length as stations)
        Ca        :  0.0                       # [-]    transverse added mass coefficient (optional, scalar or list of same length as stations)
        CdEnd     :  0.0                       # [-]    end axial drag coefficient        (optional, scalar or list of same length as stations)
        CaEnd     :  0.0                       # [-]    end axial added mass coefficient  (optional, scalar or list of same length as stations)
        rho_shell :  7850                      # [kg/m3]
        
  - potModMaster :   1      # [int] master switch for potMod variables; 0=keeps all member potMod vars the same, 1=turns all potMod vars to False (no HAMS), 2=turns all potMod vars to True (no strip)
    dlsMax       :  5.0     # maximum node splitting section amount for platform members; can't be 0
    qtfPath      :  'IEA-15-240-RWT-UMaineSemi.12d'      # path to the qtf file for the platform
    rFair        :  58
    zFair        :  -15
    fairleads    :  # list of fairlead coordinates for the platform relative to platform coordinate and 0-degree heading
                   - name: fairlead1
                     r_rel: [58, 0, -14]
                     headings: [30, 150, 270, 35] # headings in degrees for the fairlead (if multiple headings, the fairlead will be repeated for each heading)
    JTubes:
                   - name: Jtube1
                     r_rel: [5, 0, -20]
                     headings: [90, 210, 330] # headings in degrees for the Jtube (if multiple headings, the Jtube will be repeated for each heading)
    type         :  Substation
  
    members:   # list all members here
        
      - name      :  center_column             # [-]    an identifier (no longer has to be number)       
        type      :  rigid                         # [-]    
        rA        :  [ 0, 0, -20]              # [m]    end A coordinates
        rB        :  [ 0, 0,  15]              # [m]    and B coordinates
        shape     :  circ                      # [-]    circular or rectangular
        gamma     :  0.0                       # [deg]  twist angle about the member's z-axis
        potMod    :  True                      # [bool] Whether to model the member with potential flow (BEM model) plus viscous drag or purely strip theory
        # --- outer shell including hydro---
